<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Forgot Password – LeftoverFood</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;
      font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#1b5e20,#f9a825);padding:24px}
    .box{background:#fff;border-radius:16px;padding:40px 38px;max-width:420px;width:100%;
      box-shadow:0 16px 50px rgba(0,0,0,.18);text-align:center}
    .icon{font-size:2.8rem;margin-bottom:8px}
    h2{color:#1b5e20;font-size:1.5rem;font-weight:800}
    p{color:#6b7280;font-size:.86rem;margin:8px 0 22px}
    .msg{padding:10px 14px;border-radius:8px;font-size:.86rem;font-weight:600;margin-bottom:16px;text-align:left}
    .ok{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
    .er{background:#ffebee;color:#c62828;border:1px solid #ef9a9a}
    label{display:block;text-align:left;font-weight:700;font-size:.83rem;color:#374151;margin-bottom:5px}
    input{width:100%;padding:10px 13px;border:2px solid #e5e7eb;border-radius:8px;
      font-size:.9rem;font-family:'Nunito',sans-serif;outline:none;margin-bottom:16px}
    input:focus{border-color:#2e7d32}
    .btn{width:100%;padding:11px;background:#2e7d32;color:#fff;border:none;border-radius:8px;
      font-size:.95rem;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}
    .btn:hover{background:#43a047}
    .back{display:block;margin-top:16px;color:#2e7d32;font-weight:700;text-decoration:none;font-size:.86rem}
  </style>
</head>
<body>
<div class="box">
  <div class="icon">🔑</div>
  <h2>Forgot Password</h2>
  <p>Enter your registered email address and we'll send a reset link.</p>
  {% if message %}
  <div class="msg {{ 'ok' if message[0]=='success' else 'er' }}">{{ message[1] }}</div>
  {% endif %}
  <form method="POST">
    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" placeholder="your@email.com" required/>
    <button type="submit" class="btn"><i class="fas fa-paper-plane"></i> Send Reset Link</button>
  </form>
  <a href="{{ url_for('login') }}" class="back">← Back to Login</a>
</div>
</body>
</html>
